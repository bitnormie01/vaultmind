[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
ffi = false

[profile.default.fuzz]
runs = 10000
max_test_rejects = 65536
seed = "0x1"
dictionary_weight = 40

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[rpc_endpoints]
xlayer = "${XLAYER_RPC_URL}"
xlayer_testnet = "${XLAYER_TESTNET_RPC_URL}"

[etherscan]
xlayer = { key = "${ETHERSCAN_API_KEY}", chain = 196 }
